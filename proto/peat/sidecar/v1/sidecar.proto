syntax = "proto3";

package peat.sidecar.v1;

option go_package = "github.com/defenseunicorns/keycloak-portal/internal/peat/sidecarv1;sidecarv1";

// PeatSidecar exposes Peat mesh participation to co-located applications
// over gRPC (Unix socket or TCP). The sidecar is a full CRDT mesh participant;
// client applications interact with it to read/write shared state.
service PeatSidecar {
  // --- Lifecycle ---

  // GetStatus returns the current state of the sidecar node.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // --- Peer Management ---

  // ConnectPeer establishes an authenticated connection to a mesh peer.
  rpc ConnectPeer(ConnectPeerRequest) returns (ConnectPeerResponse);

  // DisconnectPeer drops the connection to a peer.
  rpc DisconnectPeer(DisconnectPeerRequest) returns (DisconnectPeerResponse);

  // ListPeers returns currently connected peers.
  rpc ListPeers(ListPeersRequest) returns (ListPeersResponse);

  // --- Generic Document CRUD ---
  // Documents are JSON blobs stored in named collections, synced via CRDT.

  // PutDocument creates or updates a document in a collection.
  rpc PutDocument(PutDocumentRequest) returns (PutDocumentResponse);

  // GetDocument retrieves a document by collection and ID.
  rpc GetDocument(GetDocumentRequest) returns (GetDocumentResponse);

  // DeleteDocument removes a document from a collection.
  rpc DeleteDocument(DeleteDocumentRequest) returns (DeleteDocumentResponse);

  // ListDocuments lists all document IDs in a collection.
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);

  // --- Typed Collections ---
  // Convenience RPCs for common Peat domain objects.

  rpc PutNode(PutNodeRequest) returns (PutNodeResponse);
  rpc GetNodes(GetNodesRequest) returns (GetNodesResponse);

  rpc PutCell(PutCellRequest) returns (PutCellResponse);
  rpc GetCells(GetCellsRequest) returns (GetCellsResponse);

  rpc PutTrack(PutTrackRequest) returns (PutTrackResponse);
  rpc GetTracks(GetTracksRequest) returns (GetTracksResponse);

  rpc PutCommand(PutCommandRequest) returns (PutCommandResponse);
  rpc GetCommands(GetCommandsRequest) returns (GetCommandsResponse);

  // --- Subscriptions ---

  // Subscribe streams document changes across all or filtered collections.
  //
  // The server sends an initial snapshot of all currently-stored matching
  // documents as CHANGE_TYPE_UPSERT events, then streams live changes.
  // Clients can distinguish snapshot from live events by consuming until
  // the server indicates readiness, or by treating all Upserts idempotently.
  rpc Subscribe(SubscribeRequest) returns (stream DocumentChange);

  // --- Sync Control ---

  // StartSync begins CRDT synchronization with connected peers.
  rpc StartSync(StartSyncRequest) returns (StartSyncResponse);

  // StopSync pauses synchronization.
  rpc StopSync(StopSyncRequest) returns (StopSyncResponse);

  // GetSyncStats returns current synchronization statistics.
  rpc GetSyncStats(GetSyncStatsRequest) returns (GetSyncStatsResponse);

  // --- Attachments (PRD-006) ---

  // SendAttachments ingests one or more local files and queues them for
  // distribution to the specified scope. Each file is validated (size, hash,
  // path inside an allowlisted root) before any blob is created — partial
  // ingestion is not allowed. Returns synchronously with handles; transfer
  // happens asynchronously.
  //
  // Safety default: with no `--attachment-root` configured on peat-node, this
  // RPC returns UNIMPLEMENTED. Operators must consciously opt in by naming
  // the roots that may be read.
  rpc SendAttachments(SendAttachmentsRequest) returns (SendAttachmentsResponse);

  // GetAttachmentDistribution returns the current status of a single
  // distribution by its ID. Returns NOT_FOUND with the offending
  // distribution_id in the error detail when the ID is unknown.
  rpc GetAttachmentDistribution(GetAttachmentDistributionRequest)
      returns (GetAttachmentDistributionResponse);

  // SubscribeAttachmentBundle streams progress updates for every distribution
  // in a bundle until all reach a terminal state or the client disconnects.
  //
  // Late-subscribe semantics (for crash-recovery):
  //   * All-terminal at subscribe time (every distribution already in
  //     COMPLETED / FAILED / CANCELLED): the server emits exactly one
  //     AttachmentProgress snapshot per distribution carrying that terminal
  //     state, then closes the stream.
  //   * Mixed state at subscribe time (some distributions already terminal,
  //     others still PENDING / IN_PROGRESS): the server emits one snapshot
  //     for each already-terminal distribution first, then streams live
  //     progress updates for the in-flight distributions, then closes once
  //     every distribution has reached a terminal state.
  //   * All-live at subscribe time (no terminal distributions yet): live
  //     streaming only — no synthetic snapshots — until terminal close.
  //
  // The late-subscribe contract covers *client* crashes. A *server*
  // (peat-node) restart drops the in-memory handle table; resubscribing to
  // a pre-restart bundle_id returns NOT_FOUND.
  rpc SubscribeAttachmentBundle(SubscribeAttachmentBundleRequest)
      returns (stream AttachmentProgress);

  // CancelAttachmentDistribution requests cancellation of an in-flight
  // distribution. Best-effort; already-transferred bytes on receivers are
  // not rolled back. Returns NOT_FOUND when distribution_id is unknown.
  rpc CancelAttachmentDistribution(CancelAttachmentDistributionRequest)
      returns (CancelAttachmentDistributionResponse);

  // --- Collection Lifecycle Configuration (peat-node#55 / ADR-016) ---

  // SetCollectionConfig persists deletion-policy and TTL settings for a named
  // collection. Settings survive node restarts. Applying a new config to an
  // existing collection replaces the prior config wholesale.
  rpc SetCollectionConfig(SetCollectionConfigRequest)
      returns (SetCollectionConfigResponse);

  // GetCollectionConfig returns the explicit config for a collection.
  // Returns NOT_FOUND when no config has been set (the default policy applies).
  rpc GetCollectionConfig(GetCollectionConfigRequest)
      returns (GetCollectionConfigResponse);

  // ListCollectionConfigs returns all explicitly configured collections.
  // Collections using the default policy are not included.
  rpc ListCollectionConfigs(ListCollectionConfigsRequest)
      returns (ListCollectionConfigsResponse);
}

// --- Lifecycle Messages ---

message GetStatusRequest {}

message GetStatusResponse {
  string node_id = 1;
  string endpoint_addr = 2;
  bool sync_active = 3;
  uint32 connected_peers = 4;
  NodePhase phase = 5;
}

enum NodePhase {
  NODE_PHASE_UNSPECIFIED = 0;
  NODE_PHASE_INITIALIZING = 1;
  NODE_PHASE_READY = 2;
  NODE_PHASE_SYNCING = 3;
  NODE_PHASE_SHUTTING_DOWN = 4;
}

// --- Peer Management Messages ---

message ConnectPeerRequest {
  // Hex-encoded Iroh endpoint ID.
  string endpoint_id = 1;
  // Optional direct addresses (host:port).
  repeated string addresses = 2;
  // Optional relay URL.
  string relay_url = 3;
}

message ConnectPeerResponse {}

message DisconnectPeerRequest {
  string endpoint_id = 1;
}

message DisconnectPeerResponse {}

message ListPeersRequest {}

message ListPeersResponse {
  repeated PeerInfo peers = 1;
}

message PeerInfo {
  string endpoint_id = 1;
  repeated string addresses = 2;
  bool connected = 3;
}

// --- Generic Document Messages ---

message PutDocumentRequest {
  string collection = 1;
  string doc_id = 2;
  // JSON-encoded document content.
  string json_data = 3;
}

message PutDocumentResponse {}

message GetDocumentRequest {
  string collection = 1;
  string doc_id = 2;
}

message GetDocumentResponse {
  // Empty if not found.
  optional string json_data = 1;
}

message DeleteDocumentRequest {
  string collection = 1;
  string doc_id = 2;
}

message DeleteDocumentResponse {}

message ListDocumentsRequest {
  string collection = 1;
}

message ListDocumentsResponse {
  repeated string doc_ids = 1;
}

// --- Typed Collection Messages ---

// Node represents a mesh participant's state.
message Node {
  string id = 1;
  string node_type = 2;
  string name = 3;
  NodeStatus status = 4;
  double latitude = 5;
  double longitude = 6;
  double altitude_m = 7;
  double readiness = 8;
  repeated string capabilities = 9;
  optional string unit_id = 10;
  optional string callsign = 11;
}

enum NodeStatus {
  NODE_STATUS_UNSPECIFIED = 0;
  NODE_STATUS_READY = 1;
  NODE_STATUS_BUSY = 2;
  NODE_STATUS_DEGRADED = 3;
  NODE_STATUS_OFFLINE = 4;
}

message PutNodeRequest {
  Node node = 1;
}

message PutNodeResponse {}

message GetNodesRequest {}

message GetNodesResponse {
  repeated Node nodes = 1;
}

// Cell represents a formation of nodes.
message Cell {
  string id = 1;
  string name = 2;
  CellStatus status = 3;
  uint32 node_count = 4;
  double center_latitude = 5;
  double center_longitude = 6;
  repeated string capabilities = 7;
  optional string formation_id = 8;
  optional string leader_id = 9;
}

enum CellStatus {
  CELL_STATUS_UNSPECIFIED = 0;
  CELL_STATUS_ACTIVE = 1;
  CELL_STATUS_INACTIVE = 2;
  CELL_STATUS_OFFLINE = 3;
}

message PutCellRequest {
  Cell cell = 1;
}

message PutCellResponse {}

message GetCellsRequest {}

message GetCellsResponse {
  repeated Cell cells = 1;
}

// Track represents an ISR track.
message Track {
  string id = 1;
  string source_node = 2;
  optional string cell_id = 3;
  optional string formation_id = 4;
  double latitude = 5;
  double longitude = 6;
  optional double altitude_m = 7;
  optional double cep_m = 8;
  optional double heading_deg = 9;
  optional double speed_mps = 10;
  string classification = 11;
  double confidence = 12;
  TrackCategory category = 13;
}

enum TrackCategory {
  TRACK_CATEGORY_UNSPECIFIED = 0;
  TRACK_CATEGORY_PERSON = 1;
  TRACK_CATEGORY_VEHICLE = 2;
  TRACK_CATEGORY_GROUND = 3;
  TRACK_CATEGORY_AIR = 4;
  TRACK_CATEGORY_UNKNOWN = 5;
}

message PutTrackRequest {
  Track track = 1;
}

message PutTrackResponse {}

message GetTracksRequest {}

message GetTracksResponse {
  repeated Track tracks = 1;
}

// Command represents a C2 command.
message Command {
  string id = 1;
  string target_id = 2;
  string command_type = 3;
  CommandStatus status = 4;
  int64 created_at = 5;
  int64 expires_at = 6;
  // JSON-encoded command payload.
  string payload_json = 7;
}

enum CommandStatus {
  COMMAND_STATUS_UNSPECIFIED = 0;
  COMMAND_STATUS_PENDING = 1;
  COMMAND_STATUS_EXECUTING = 2;
  COMMAND_STATUS_COMPLETED = 3;
  COMMAND_STATUS_FAILED = 4;
  COMMAND_STATUS_CANCELLED = 5;
}

message PutCommandRequest {
  Command command = 1;
}

message PutCommandResponse {}

message GetCommandsRequest {}

message GetCommandsResponse {
  repeated Command commands = 1;
}

// --- Subscription Messages ---

message SubscribeRequest {
  // If empty, subscribe to all collections.
  repeated string collections = 1;

  // Optional predicate evaluated against each document's JSON payload.
  // Absent (the default) yields the prior behavior: stream every change
  // for the requested collections. See `SubscriptionQuery`.
  optional SubscriptionQuery query = 2;
}

// SubscriptionQuery filters change events by document content.
//
// Mirrors `peat_mesh::sync::types::Query` for the variants meaningful at
// the sidecar boundary (no spatial / deletion-aware modifiers in v1).
// `value` fields are JSON-encoded scalars (e.g. `"\"vehicle\""`, `"42"`,
// `"true"`) — matches the `string json_data` convention used elsewhere
// in this proto and keeps the wire format trivially debuggable.
//
// DELETE events have no payload to evaluate against; the matcher passes
// them through only for `Query::all` so callers asking for filtered
// streams aren't surprised by tombstones outside their predicate.
message SubscriptionQuery {
  oneof q {
    QueryEq  eq  = 1;
    QueryCmp lt  = 2;
    QueryCmp gt  = 3;
    QueryAnd and = 4;
    QueryOr  or  = 5;
    SubscriptionQuery not = 6;
    QueryAll all = 7;
  }
}

message QueryEq {
  // Top-level JSON field name, e.g. "node_type". Nested paths
  // (e.g. "location.lat") are not supported in v1; the matcher does a
  // single-level object lookup. Dotted-path support is planned and will
  // be additive — no wire change required.
  string field = 1;
  // JSON-encoded value (e.g. `"\"vehicle\""`, `"true"`, `"3.14"`).
  string value = 2;
}

message QueryCmp {
  // Top-level JSON field name, e.g. "altitude_m". Same v1 restriction
  // as `QueryEq.field`: no nested / dotted paths.
  string field = 1;
  // JSON-encoded value. Strings, integers, and floats compare; bools
  // and null do not.
  string value = 2;
}

message QueryAnd {
  repeated SubscriptionQuery clauses = 1;
}

message QueryOr {
  repeated SubscriptionQuery clauses = 1;
}

message QueryAll {}

message DocumentChange {
  string collection = 1;
  string doc_id = 2;
  ChangeType change_type = 3;
  // JSON content (present for upserts, absent for deletes).
  optional string json_data = 4;
}

enum ChangeType {
  CHANGE_TYPE_UNSPECIFIED = 0;
  CHANGE_TYPE_UPSERT = 1;
  CHANGE_TYPE_DELETE = 2;
}

// --- Sync Control Messages ---

message StartSyncRequest {}

message StartSyncResponse {}

message StopSyncRequest {}

message StopSyncResponse {}

message GetSyncStatsRequest {}

message GetSyncStatsResponse {
  bool sync_active = 1;
  uint32 connected_peers = 2;
  uint64 bytes_sent = 3;
  uint64 bytes_received = 4;
}

// --- Attachment Messages (PRD-006) ---

// FileSpec describes one file in a SendAttachments bundle. The caller asserts
// size_bytes and sha256; peat-node verifies both in the same I/O pass as
// blob ingest. Any mismatch deletes the partial blob — no orphans.
message FileSpec {
  // Name of an allowlisted root configured on peat-node (see Configuration).
  // Must exist in --attachment-root; unknown roots → INVALID_ARGUMENT.
  string root_name = 1;

  // Path relative to the named root. Must not be empty, must not start with
  // `/`, must not contain `..` as a path component. After canonicalisation
  // the resolved path must still be a descendant of the canonicalised root.
  // Files are opened with O_NOFOLLOW (where supported) to mitigate
  // TOCTOU symlink swaps between path check and open.
  string relative_path = 2;

  // Expected file size in bytes. Must match on-disk size exactly.
  // Subject to --attachment-max-file-bytes per-file cap.
  uint64 size_bytes = 3;

  // Expected sha256 of file contents — exactly 32 raw bytes (NOT hex-encoded).
  // A bytes field of any other length is rejected INVALID_ARGUMENT with
  // `files[i].sha256` field path in the error detail before the file is
  // opened. Hex callers must decode to raw bytes themselves.
  bytes sha256 = 4;

  // Optional MIME type, forwarded to receivers in the distribution doc.
  // Not part of the bundle-id idempotency identity check.
  optional string content_type = 5;

  // Optional display name presented to receivers; defaults to relative_path's
  // basename. Not part of the bundle-id idempotency identity check.
  optional string display_name = 6;
}

// DistributionScopeSpec targets a SendAttachments bundle. An unset oneof
// (including a SendAttachmentsRequest that omits `scope` entirely) is
// rejected INVALID_ARGUMENT — there is no silent fallback to AllNodes.
message DistributionScopeSpec {
  oneof scope {
    AllNodesScope all_nodes = 1;
    NodeListScope node_list = 2;
    FormationScope formation = 3;
    // Capable is a reserved-but-rejected variant in v1: an empty CapableScope
    // marker. peat-node always rejects it with FAILED_PRECONDITION until the
    // capability vocabulary is decided in a follow-on ADR. Senders MAY
    // include it so the oneof can grow without renumbering when the ADR
    // ships.
    CapableScope capable = 4;
  }
}

// AllNodesScope distributes to every reachable mesh peer. Always accepted.
message AllNodesScope {}

// NodeListScope distributes only to the listed node IDs. Unknown IDs are not
// a request-time error — a node may not yet be known to this peat-node — but
// they are recorded and surface in per-node status as FAILED after the
// configurable peer-discovery grace period (--attachment-discovery-grace-secs).
// Subject to --attachment-max-node-list-len cap.
message NodeListScope {
  repeated string node_ids = 1;
}

// FormationScope distributes to a named formation. v1: if formation_id is
// not resolvable, fails FAILED_PRECONDITION (no async resolution).
message FormationScope {
  string formation_id = 1;
}

// CapableScope is an intentionally-empty reserved variant in v1. The
// capability vocabulary (device-runtime vs. model-capability axes, and the
// exact predicate fields) is deferred to a follow-on ADR — pinning fields
// into the wire format before that decision would force either a breaking
// migration or a parallel CapableV2Scope when the schema lands. v1 senders
// MAY include CapableScope; peat-node always rejects it FAILED_PRECONDITION.
message CapableScope {}

// AttachmentPriority records the QoS classification of an attachment bundle.
// Each value maps 1:1 onto `peat_protocol::qos::QoSClass`:
//   BULK     → QoSClass::Bulk     (P5) — opportunistic; aging-eligible source
//   LOW      → QoSClass::Low      (P4) — intermediate aging tier
//   ROUTINE  → QoSClass::Normal   (P3) — default
//   PRIORITY → QoSClass::High     (P2) — preempts BULK/LOW once PRD-004 lands
//   CRITICAL → QoSClass::Critical (P1) — preempts everything once PRD-004 lands
//
// All five tiers (including LOW/P4) are exposed because peat-protocol's
// aging-promotion path is `Bulk → Low → Normal` (sync_queue.rs:118-119);
// collapsing P4 out of the wire surface would skip the intermediate aging
// tier or silently drop the aging promotion.
//
// v1-honesty: peat-node records the classification on the distribution
// document and uses it for ordering within its own queues, but does NOT
// enforce wire-level preemption between classes — a CRITICAL bundle will
// not actually pause an in-flight BULK transfer in v1. Cross-class
// preemption requires PRD-004 (Bandwidth Allocation to Sync Transport).
// Parallels the v1-honesty pattern on DistributionStatus.PARTIAL and
// NodeTransferState.
enum AttachmentPriority {
  ATTACHMENT_PRIORITY_UNSPECIFIED = 0;
  ATTACHMENT_PRIORITY_BULK = 1;
  ATTACHMENT_PRIORITY_LOW = 2;
  ATTACHMENT_PRIORITY_ROUTINE = 3;
  ATTACHMENT_PRIORITY_PRIORITY = 4;
  ATTACHMENT_PRIORITY_CRITICAL = 5;
}

message SendAttachmentsRequest {
  // 1..=--attachment-max-files-per-bundle entries. Empty or over-cap →
  // INVALID_ARGUMENT (empty) or RESOURCE_EXHAUSTED (over-cap).
  repeated FileSpec files = 1;

  // Required. An unset oneof (or an omitted `scope` field, which decodes to
  // a default-constructed DistributionScopeSpec with no variant set) is
  // rejected INVALID_ARGUMENT with `scope` in the field path — no silent
  // fallback to AllNodes.
  DistributionScopeSpec scope = 2;

  // Defaults to ROUTINE when ATTACHMENT_PRIORITY_UNSPECIFIED.
  AttachmentPriority priority = 3;

  // Optional client-supplied bundle ID for idempotency. If omitted, peat-node
  // assigns a UUIDv4. Re-submitting the same bundle_id with an identical
  // FileSpec identity set (root_name, relative_path, size_bytes, sha256, in
  // order — content_type and display_name are NOT part of the identity
  // check) is a no-op that returns the existing handles; re-submitting with
  // any identity-set deviation is rejected ALREADY_EXISTS. Resubmission
  // against a FAILED or CANCELLED bundle is accepted as a fresh ingest.
  optional string bundle_id = 4;
}

message SendAttachmentsResponse {
  string bundle_id = 1;
  // One handle per FileSpec, in the request's `files` order.
  repeated AttachmentHandle handles = 2;
}

message AttachmentHandle {
  // Index into the request's `files` list — matches caller's submission order.
  uint32 file_index = 1;
  // Iroh blob token (BLAKE3-based content address). Stable across retries.
  string blob_token = 2;
  // Distribution-doc ID for status lookup / subscription.
  string distribution_id = 3;
}

message GetAttachmentDistributionRequest {
  string distribution_id = 1;
}

message GetAttachmentDistributionResponse {
  DistributionStatus status = 1;
  uint64 bytes_transferred = 2;
  uint64 bytes_total = 3;
  repeated NodeTransferState per_node = 4;
  optional string error = 5;
}

// NodeTransferState reflects the sender's outbound view of a transfer in v1.
// Because iroh-blobs is pull-based, `status` records whether the targeted
// peer connected to fetch the blob and how many bytes the sender served —
// not whether the receiver's local write succeeded. Receive-side completion
// reporting requires the observer hooks deferred to v2.
message NodeTransferState {
  string node_id = 1;
  DistributionStatus status = 2;
  uint64 bytes_transferred = 3;
}

// DistributionStatus is the sender-side view of a distribution in v1.
// COMPLETED means every targeted peer connected and pulled all bytes from
// this sender. PARTIAL is RESERVED for v2 — until receive-side observer
// hooks land it cannot fire reliably from sender-side state alone, so v1
// implementations emit COMPLETED on full sender-side success and FAILED on
// explicit transfer failure, leaving PARTIAL for the v2 contract.
enum DistributionStatus {
  DISTRIBUTION_STATUS_UNSPECIFIED = 0;
  DISTRIBUTION_STATUS_PENDING = 1;
  DISTRIBUTION_STATUS_IN_PROGRESS = 2;
  DISTRIBUTION_STATUS_COMPLETED = 3;
  DISTRIBUTION_STATUS_PARTIAL = 4;
  DISTRIBUTION_STATUS_FAILED = 5;
  DISTRIBUTION_STATUS_CANCELLED = 6;
}

message SubscribeAttachmentBundleRequest {
  string bundle_id = 1;
}

message AttachmentProgress {
  string distribution_id = 1;
  string blob_token = 2;
  DistributionStatus status = 3;
  uint64 bytes_transferred = 4;
  uint64 bytes_total = 5;
  // Set when this update was triggered by a single-peer state change.
  optional NodeTransferState changed_node = 6;
  optional string error = 7;
}

message CancelAttachmentDistributionRequest {
  string distribution_id = 1;
}

message CancelAttachmentDistributionResponse {
  // True iff cancellation was applied; false if the distribution was already
  // in a terminal state (COMPLETED / FAILED / CANCELLED) when the request
  // arrived.
  bool was_cancelled = 1;
}

// --- Collection Lifecycle Configuration Messages (peat-node#55 / ADR-016) ---

message SetCollectionConfigRequest {
  CollectionConfig config = 1;
}

message SetCollectionConfigResponse {}

message GetCollectionConfigRequest {
  string collection = 1;
}

message GetCollectionConfigResponse {
  CollectionConfig config = 1;
}

message ListCollectionConfigsRequest {}

message ListCollectionConfigsResponse {
  repeated CollectionConfig configs = 1;
}

// CollectionConfig controls deletion semantics and TTLs for a named collection.
//
// The deletion_policy field maps to peat_mesh::qos::DeletionPolicy. Policy
// enforcement through peat-mesh is per-collection once peat-mesh gains a
// set_deletion_policy() surface on AutomergeBackend (tracked separately).
// In this release, policy is persisted and surfaced via GetCollectionConfig /
// ListCollectionConfigs; callers may also inspect it to implement
// application-layer delete routing.
message CollectionConfig {
  string collection = 1;
  DeletionPolicy deletion_policy = 2;
  // ADR-016 Tier 1: how long soft-deleted documents are retained before GC.
  // 0 means "use the mesh default". Only meaningful with DELETION_POLICY_SOFT_DELETE.
  optional uint64 soft_delete_ttl_secs = 3;
  // ADR-016 Tier 2: how long tombstones are retained before GC.
  // 0 means "use the mesh default (168h)". Only meaningful with DELETION_POLICY_TOMBSTONE.
  optional uint64 tombstone_ttl_secs = 4;
}

// DeletionPolicy mirrors peat_mesh::qos::DeletionPolicy for the sidecar API.
enum DeletionPolicy {
  DELETION_POLICY_UNSPECIFIED = 0;
  // Documents are marked _deleted=true but never removed. Full audit trail.
  // Default when no explicit policy is set.
  DELETION_POLICY_SOFT_DELETE = 1;
  // Explicit tombstones propagate to peers and are GC'd after tombstone_ttl.
  DELETION_POLICY_TOMBSTONE = 2;
  // Documents superseded by newer versions; old docs GC'd after soft_delete_ttl.
  DELETION_POLICY_IMPLICIT_TTL = 3;
  // Deletion is not allowed for this collection.
  DELETION_POLICY_IMMUTABLE = 4;
}
