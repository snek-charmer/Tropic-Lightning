# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/uds-cli/refs/heads/main/uds.schema.json
kind: UDSBundle
metadata:
  name: keycloak-portal
  description: >-
    Keycloak OIDC portal with peat-backed, edge/disconnected data sources,
    bundled with the UDS Core platform (Istio, Keycloak, UDS Operator).
  version: "0.1.0"

packages:
  # 1) Zarf init — bootstraps the in-cluster registry, Zarf agent, etc.
  - name: init
    repository: ghcr.io/zarf-dev/packages/init
    ref: v0.77.0

  # 2) UDS Core — Istio service mesh, Keycloak (SSO), and the UDS Operator that
  #    reconciles the Package CR (SSO clients, VirtualServices, NetworkPolicies).
  #    Pin to the uds-core version + flavor used in your environment
  #    (flavors: -upstream | -registry1 | -unicorn).
  - name: core
    repository: ghcr.io/defenseunicorns/packages/uds/core
    ref: 1.6.0-upstream

  # 3) The portal. Built locally from deploy/zarf (see README); referenced here by
  #    path. UDS-specific config is applied via Helm overrides.
  - name: keycloak-portal
    path: ../zarf
    ref: 0.1.0
    overrides:
      # <zarf-component>: <helm-chart>:
      keycloak-portal:
        keycloak-portal:
          values:
            - path: uds.enabled
              value: true
            - path: image.repository
              value: keycloak-portal
            - path: image.tag
              value: "0.1.0"
          variables:
            - name: PORTAL_HOST
              path: uds.expose.host
              description: "External hostname for the portal (also derives redirect URLs)"
              default: "portal.uds.dev"
            - name: GATEWAY
              path: uds.expose.gateway
              description: "UDS gateway: tenant | admin | passthrough"
              default: tenant
            - name: ISSUER
              path: config.issuer
              description: "Keycloak realm issuer URL"
            - name: CLIENT_ID
              path: config.clientId
              description: "OIDC client ID (UDS creates this Keycloak client)"
              default: keycloak-portal
            - name: PEAT_NODE_ADDR
              path: config.peatNodeAddr
              description: "peat node gRPC endpoint backing data-source storage"
              default: "peat-node-peat-node.peat-system.svc:50051"
            - name: PEAT_NAMESPACE
              path: uds.peat.namespace
              description: "Namespace of the peat node (for the egress NetworkPolicy)"
              default: peat-system
