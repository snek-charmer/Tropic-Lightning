# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/uds-cli/refs/heads/main/uds.schema.json
kind: UDSBundle
metadata:
  name: keycloak-portal
  description: >-
    Keycloak OIDC portal with peat-backed, edge/disconnected data sources.
    App-only bundle: it layers onto an existing UDS platform (Zarf init and
    UDS Core / Istio / Keycloak / UDS Operator must already be deployed).
  version: "0.1.15"

packages:
  - name: keycloak-portal
    path: ../zarf
    ref: 0.1.15
    overrides:
      # <zarf-component>: <helm-chart>:
      keycloak-portal:
        keycloak-portal:
          values:
            - path: uds.enabled
              value: true
            - path: image.repository
              value: keycloak-portal
            - path: image.tag
              value: "0.1.15"
          variables:
            - name: PORTAL_HOST
              path: uds.expose.host
              description: "Portal subdomain ONLY (UDS appends the domain). e.g. 'portal' => portal.<domain>"
              default: "portal"
            - name: DOMAIN
              path: uds.expose.domain
              description: "Cluster domain UDS appends to the host; used to build the OIDC redirect URLs"
              default: "uds.dev"
            - name: GATEWAY
              path: uds.expose.gateway
              description: "UDS gateway: tenant | admin | passthrough"
              default: tenant
            - name: ISSUER
              path: uds.sso.issuer
              description: "OIDC issuer override. Leave unset to derive https://sso.<DOMAIN>/realms/<REALM>"
            - name: REALM
              path: uds.sso.realm
              description: "Keycloak realm (UDS Core default: uds)"
              default: uds
            - name: KEYCLOAK_INTERNAL_URL
              path: uds.sso.keycloakInternalUrl
              description: "In-cluster Keycloak base URL for back-channel (token + JWKS) calls"
              default: "http://keycloak-http.keycloak.svc.cluster.local:8080"
            - name: CLIENT_ID
              path: config.clientId
              description: "OIDC client ID (UDS creates this Keycloak client)"
              default: keycloak-portal
            - name: PEAT_NODE_ADDR
              path: config.peatNodeAddr
              description: "peat node gRPC endpoint backing data-source storage"
              default: "peat-node-peat-node.peat-system.svc:50051"
            - name: PEAT_NAMESPACE
              path: uds.peat.namespace
              description: "Namespace of the peat node (for the egress NetworkPolicy)"
              default: peat-system
            - name: API_EGRESS
              path: uds.weather.egress
              description: "Allow egress to external HTTPS APIs (weather + HTTP/JSON connectors). Set false for air-gapped sites."
              default: "true"
            - name: WEATHER_API_URL
              path: config.weatherApiUrl
              description: "Override the Open-Meteo endpoint (e.g. an in-cluster mirror for air-gapped sites)"
              default: ""
            - name: WEATHER_POLL_INTERVAL
              path: config.weatherPollInterval
              description: "How often to refresh live weather connectors when connected; '0'/'off' disables"
              default: "10m"
            - name: HTTP_POLL_INTERVAL
              path: config.httpPollInterval
              description: "How often to refresh generic HTTP/JSON connectors when connected; '0'/'off' disables"
              default: "10m"
