# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/uds-cli/refs/heads/main/uds.schema.json
#
# Full, self-contained stack for transport / air-gap: the UDS Zarf init, UDS Core
# (slim-dev), and the keycloak-portal app — in one bundle, deployed in order.
#
# Use this when you want to stand the whole platform up from nothing (e.g. a
# fresh k3s on a laptop). If UDS init + Core are ALREADY on the cluster, use the
# app-only bundle at ../uds instead.
#
# Build (run from this directory; build the app image first):
#   docker build -t keycloak-portal:0.1.29 ../..
#   uds create . --architecture amd64 --confirm      # or arm64
# Deploy:
#   uds deploy uds-bundle-keycloak-portal-stack-*.tar.zst --confirm \
#     --set DOMAIN=uds.dev --set PORTAL_HOST=portal
kind: UDSBundle
metadata:
  name: keycloak-portal-stack
  description: >-
    Transportable stack — UDS init + UDS Core (slim-dev) + the Keycloak OIDC
    portal with peat-backed, edge/disconnected data sources.
  version: "0.1.29"

packages:
  # 1) UDS-flavored Zarf init: in-cluster registry, Zarf agent, etc.
  - name: init
    repository: ghcr.io/zarf-dev/packages/init
    ref: v0.77.0

  # 2) UDS Core (slim-dev): Istio + Keycloak (SSO) + Pepr/UDS Operator — the
  #    platform pieces the portal depends on. Lighter than full Core; good for
  #    local/single-node. DOMAIN defaults to uds.dev; override to match the app.
  - name: core-slim-dev
    repository: registry.defenseunicorns.com/public/core
    ref: 1.6.0-registry1

  - name: peat-node
    path: .
    ref: 0.3.3
  # 3) The application (built from the local Zarf package at deploy/zarf).
  - name: keycloak-portal
    path: ../zarf
    ref: 0.1.29
    overrides:
      # <zarf-component>: <helm-chart>:
      keycloak-portal:
        keycloak-portal:
          values:
            - path: uds.enabled
              value: true
            - path: image.repository
              value: keycloak-portal
            - path: image.tag
              value: "0.1.29"
          variables:
            - name: PORTAL_HOST
              path: uds.expose.host
              description: "Portal subdomain ONLY (UDS appends the domain). e.g. 'portal' => portal.<domain>"
              default: "portal"
            - name: DOMAIN
              path: uds.expose.domain
              description: "Cluster domain UDS appends to the host. Must match Core's DOMAIN."
              default: "uds.dev"
            - name: GATEWAY
              path: uds.expose.gateway
              description: "UDS gateway: tenant | admin | passthrough"
              default: tenant
            - name: ISSUER
              path: uds.sso.issuer
              description: "OIDC issuer override. Leave unset to derive https://sso.<DOMAIN>/realms/<REALM>"
            - name: REALM
              path: uds.sso.realm
              description: "Keycloak realm (UDS Core default: uds)"
              default: uds
            - name: KEYCLOAK_INTERNAL_URL
              path: uds.sso.keycloakInternalUrl
              description: "In-cluster Keycloak base URL for back-channel (token + JWKS) calls"
              default: "http://keycloak-http.keycloak.svc.cluster.local:8080"
            - name: CLIENT_ID
              path: config.clientId
              description: "OIDC client ID (UDS creates this Keycloak client)"
              default: keycloak-portal
            - name: PEAT_NODE_ADDR
              path: config.peatNodeAddr
              description: "peat node gRPC endpoint backing data-source storage"
              default: "peat-node-peat-node.peat-system.svc:50051"
            - name: PEAT_NAMESPACE
              path: uds.peat.namespace
              description: "Namespace of the peat node (for the egress NetworkPolicy)"
              default: peat-system
            - name: API_EGRESS
              path: uds.weather.egress
              description: "Allow egress to external HTTPS APIs (weather + HTTP/JSON connectors). Set false for air-gapped sites."
              default: "true"
            - name: WEATHER_API_URL
              path: config.weatherApiUrl
              description: "Override the Open-Meteo endpoint (e.g. an in-cluster mirror for air-gapped sites)"
              default: ""
            - name: WEATHER_POLL_INTERVAL
              path: config.weatherPollInterval
              description: "How often to refresh live weather connectors when connected; '0'/'off' disables"
              default: "10m"
            - name: HTTP_POLL_INTERVAL
              path: config.httpPollInterval
              description: "How often to refresh generic HTTP/JSON connectors when connected; '0'/'off' disables"
              default: "10m"
