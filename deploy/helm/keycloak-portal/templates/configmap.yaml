apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak-portal.fullname" . }}
  labels:
    {{- include "keycloak-portal.labels" . | nindent 4 }}
data:
  LISTEN_ADDR: {{ .Values.config.listenAddr | quote }}
  KEYCLOAK_ISSUER: {{ .Values.config.issuer | quote }}
  OIDC_CLIENT_ID: {{ .Values.config.clientId | quote }}
  OIDC_REDIRECT_URL: {{ .Values.config.redirectUrl | quote }}
  OIDC_POST_LOGOUT_REDIRECT_URL: {{ .Values.config.postLogoutRedirectUrl | quote }}
  OIDC_SCOPES: {{ .Values.config.scopes | quote }}
  COOKIE_SECURE: {{ .Values.config.cookieSecure | quote }}
