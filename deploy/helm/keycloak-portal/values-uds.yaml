# Example overrides for deploying via UDS (UDS Operator manages SSO + exposure).
# Usage (in a UDS Core cluster):
#   helm upgrade --install portal deploy/helm/keycloak-portal \
#     -n portal --create-namespace -f deploy/helm/keycloak-portal/values-uds.yaml
#
# With UDS you do NOT supply the OIDC client secret — the UDS Operator creates
# the Keycloak client and writes the secret into uds.sso.secretName, which the
# chart reads automatically.

image:
  repository: keycloak-portal
  tag: "0.1.24"

uds:
  enabled: true
  expose:
    host: "portal"              # subdomain ONLY — UDS appends the domain below
    domain: "uds.dev"           # cluster domain (=> portal.uds.dev)
    gateway: tenant
    # For the admin gateway, set the full host instead:
    # fullHost: "portal.admin.uds.dev"
  sso:
    clientName: "Keycloak Portal"
    secretName: keycloak-portal-sso
    # OIDC issuer is derived as https://<keycloakHost>.<expose.domain>/realms/<realm>
    # (=> https://sso.uds.dev/realms/uds). Override realm/keycloakHost if different,
    # or set `issuer` to a full URL to override entirely.
    realm: "uds"
    keycloakHost: "sso"
    # issuer: "https://sso.uds.dev/realms/uds"
    # Back-channel (token + JWKS) goes to Keycloak in-cluster so the pod doesn't
    # hair-pin to the public SSO host. Verify the service: kubectl -n keycloak get svc
    keycloakInternalUrl: "http://keycloak-http.keycloak.svc.cluster.local:8080"
    # Restrict to a Keycloak group (optional):
    # groups: ["/UDS Core/Admin"]
  peat:
    namespace: peat-system
    port: 50051

config:
  # Under UDS, KEYCLOAK_ISSUER and the redirect URLs are derived (see uds.sso /
  # uds.expose above), so config.issuer / redirectUrl here are unused.
  clientId: keycloak-portal
  cookieSecure: true
  peatNodeAddr: "peat-node-peat-node.peat-system.svc:50051"
  peatCollection: data_sources
  peatTls: false
