# Default values for keycloak-portal.

replicaCount: 1

image:
  repository: keycloak-portal
  tag: local
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # If empty and create is true, a name is generated from the release.
  name: ""
  annotations: {}

# Extra annotations/labels merged onto the pod template.
podAnnotations: {}
podLabels: {}

# -- Application configuration (rendered into a ConfigMap, exposed as env vars).
config:
  # Keycloak realm issuer URL. Use the in-cluster Service DNS for the discovery
  # call AND a URL the browser can reach — they must be the SAME value, or token
  # validation fails (the issuer claim must match). With Istio that is usually
  # the public gateway host for Keycloak, e.g.
  #   https://keycloak.example.com/realms/portal
  issuer: "https://keycloak.example.com/realms/portal"
  clientId: "keycloak-portal"
  # Must match a Valid Redirect URI on the Keycloak client (the portal's host).
  redirectUrl: "https://portal.example.com/auth/callback"
  postLogoutRedirectUrl: "https://portal.example.com/"
  scopes: "openid profile email roles"
  # Set true when served over HTTPS (recommended through an Istio gateway).
  cookieSecure: true
  # Container listen address. Keep in sync with service.targetPort below.
  listenAddr: ":3000"
  # Keycloak group whose members get admin (in addition to the "admin" realm
  # role). Matches the token's "groups" claim (full path).
  adminGroup: "/UDS Core/Admin"
  # In-cluster Keycloak base URL (scheme://host:port, no realm path) for
  # server-side back-channel calls (token exchange + JWKS), so the pod doesn't
  # hair-pin to the public SSO host through the mesh. Empty = use the issuer for
  # everything. Under UDS this defaults to uds.sso.keycloakInternalUrl.
  keycloakInternalUrl: ""
  # peat node gRPC endpoint backing data-source storage. peat owns persistence,
  # disconnected operation, and CRDT mesh sync. Default targets a sidecar/node
  # in the peat-system namespace.
  peatNodeAddr: "peat-node-peat-node.peat-system.svc:50051"
  # peat document collection used for data sources.
  peatCollection: "data_sources"
  # Dial the peat node over TLS (false for plaintext sidecar/in-mesh traffic).
  peatTls: false

# -- OIDC client secret handling.
clientSecret:
  # Used to create a Secret when existingSecret.name is empty.
  value: ""
  existingSecret:
    # If set, the chart references this Secret instead of creating one.
    name: ""
    key: "OIDC_CLIENT_SECRET"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# -- UDS integration. When enabled, a uds.dev/v1alpha1 Package CR is rendered so
# the UDS Operator manages SSO (creates the Keycloak client + secret), Istio
# exposure (VirtualService), and NetworkPolicies. Requires UDS Core in-cluster.
# When enabled, the chart's own VirtualService and OIDC client Secret are NOT
# rendered (UDS provides them).
uds:
  enabled: false
  expose:
    # Subdomain ONLY — UDS appends the cluster domain (host "portal" + domain
    # "uds.dev" => portal.uds.dev). Do NOT include the domain here, or it gets
    # appended twice (portal.uds.dev.uds.dev).
    host: "portal"
    # Cluster domain UDS appends to the host. Used to build the full external URL
    # for the OIDC redirect URIs (the expose host itself only takes the subdomain).
    domain: "uds.dev"
    # Optional: set the full external host explicitly (overrides host + domain),
    # e.g. for the admin gateway: "portal.admin.uds.dev".
    fullHost: ""
    # UDS gateway: tenant | admin | passthrough.
    gateway: tenant
  sso:
    clientName: "Keycloak Portal"
    # Secret the UDS Operator writes the generated client secret into. The chart
    # reads OIDC_CLIENT_SECRET from this secret when uds.enabled.
    secretName: keycloak-portal-sso
    # Optional Keycloak group restriction (anyOf). Empty = no restriction.
    groups: []
    # Keycloak realm the client lives in (UDS Core's default realm is "uds").
    realm: "uds"
    # Keycloak subdomain; the OIDC issuer host is <keycloakHost>.<expose.domain>.
    keycloakHost: "sso"
    # Explicit issuer override. Empty => derive
    # https://<keycloakHost>.<expose.domain>/realms/<realm>. This keeps the app
    # from failing on a missing/empty KEYCLOAK_ISSUER under UDS.
    issuer: ""
    # In-cluster Keycloak base URL for back-channel calls (token + JWKS). Avoids
    # hair-pinning to the public SSO host through the gateway/mesh. Verify the
    # service name in your cluster: `kubectl -n keycloak get svc`.
    keycloakInternalUrl: "http://keycloak-http.keycloak.svc.cluster.local:8080"
  peat:
    # Egress NetworkPolicy target for the peat node (data-source backend).
    namespace: peat-system
    port: 50051
  # Additional spec.network.allow rules appended verbatim.
  extraAllow: []

istio:
  # Request the Istio sidecar on the pod (relies on mesh-wide mTLS; no extra
  # PeerAuthentication is rendered).
  sidecarInject: true
  virtualService:
    enabled: true
    # Existing Gateway to bind to, "<namespace>/<name>".
    gateway: "istio-system/main"
    hosts:
      - "portal.example.com"
    # Optional per-route settings.
    timeout: ""        # e.g. "15s"
    # Match on these path prefixes; empty means match all.
    matchPrefixes: []  # e.g. ["/"]

# The app's "/" route returns 200 without auth — used for probes.
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi

# Distroless image already runs as nonroot (uid 65532); enforce it explicitly.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
