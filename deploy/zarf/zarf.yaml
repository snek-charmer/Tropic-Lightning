# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: keycloak-portal
  version: 0.1.14
  description: >-
    Keycloak OIDC portal with peat-backed, edge/disconnected data sources.
    Deploys the portal Helm chart and bundles its container image for
    air-gapped delivery. Keycloak and the peat node are platform
    prerequisites (provided by the cluster, not this package).
  # Reproducible builds.
  source: https://github.com/snek-charmer/Tropic-Lightning

variables:
  - name: ISSUER
    description: "Keycloak realm issuer URL, identical for browser and pod (e.g. https://keycloak.example.com/realms/portal)"
    prompt: true
  - name: CLIENT_ID
    description: "Keycloak OIDC client ID"
    default: keycloak-portal
  - name: CLIENT_SECRET
    description: "OIDC client secret (standalone Zarf only; set with --set CLIENT_SECRET=... or --confirm prompts). Ignored under UDS, which auto-generates the client secret."
    sensitive: true
    default: ""
  - name: HOST
    description: "Public hostname for the portal (used for the Istio VirtualService and the OIDC redirect URLs)"
    prompt: true
  - name: GATEWAY
    description: "Existing Istio gateway to bind to, <namespace>/<name>"
    default: istio-system/main
  - name: PEAT_NODE_ADDR
    description: "peat node gRPC endpoint backing data-source storage"
    default: peat-node-peat-node.peat-system.svc:50051
  - name: PEAT_TLS
    description: "Dial the peat node over TLS"
    default: "false"
  - name: WEATHER_POLL_INTERVAL
    description: "How often to refresh live weather connectors (Open-Meteo) when connected; '0'/'off' disables"
    default: "10m"

components:
  - name: keycloak-portal
    required: true
    description: "Portal Helm chart + container image"
    charts:
      - name: keycloak-portal
        namespace: portal
        # Path is relative to this zarf.yaml.
        localPath: ../helm/keycloak-portal
        version: 0.1.14
        valuesFiles:
          - values.yaml
    images:
      # Bundled into the package; the Zarf agent rewrites this to the in-cluster
      # registry at deploy time. Build/tag this image before `zarf package create`.
      - keycloak-portal:0.1.14
